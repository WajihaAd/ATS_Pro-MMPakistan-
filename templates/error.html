<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error {{ code }} · {{ app_name }}</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
  <div class="text-center">
    <div class="stat-icon icon-red mx-auto mb-3" style="width:64px;height:64px;font-size:1.6rem;">
      <i class="fa-solid fa-triangle-exclamation"></i>
    </div>
    <h1 style="font-size:2.4rem;">{{ code }}</h1>
    <p class="text-muted-ats mb-4">{{ message }}</p>
    <a href="/dashboard" class="btn btn-ats-primary"><i class="fa-solid fa-house me-1"></i> Back to Dashboard</a>
  </div>
</body>
</html>
